name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./api
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './api/package-lock.json'

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test

  terraform:
    name: Terraform Apply
    needs: test-backend
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      public_ip: ${{ steps.apply.outputs.public_ip }}
      frontend_ecr_repo: ${{ steps.apply.outputs.frontend_ecr_repo }}
      backend_ecr_repo: ${{ steps.apply.outputs.backend_ecr_repo }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }} # Required for AWS Learner Labs
        aws-region: us-east-1

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      working-directory: ./terraform
      run: terraform init

    - name: Terraform Apply
      working-directory: ./terraform
      id: apply
      run: |
        terraform apply -auto-approve
        echo "public_ip=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT
        echo "frontend_ecr_repo=$(terraform output -raw frontend_ecr_repository_url)" >> $GITHUB_OUTPUT
        echo "backend_ecr_repo=$(terraform output -raw backend_ecr_repository_url)" >> $GITHUB_OUTPUT

    - name: Upload Private Key
      uses: actions/upload-artifact@v4
      with:
        name: private-key
        path: ./terraform/private_key.pem
        retention-days: 1

  build-push:
    name: Build & Push Images
    needs: terraform
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }} # Required for AWS Learner Labs
        aws-region: us-east-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push images to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: latest
      run: |
        # Build and Push Frontend
        docker build -t $ECR_REGISTRY/frontend-repo-v2:$IMAGE_TAG ./login_page
        docker push $ECR_REGISTRY/frontend-repo-v2:$IMAGE_TAG
        
        # Build and Push Backend
        docker build -t $ECR_REGISTRY/backend-repo-v2:$IMAGE_TAG ./api
        docker push $ECR_REGISTRY/backend-repo-v2:$IMAGE_TAG

  deploy-ec2:
    name: Deploy to EC2
    needs: [terraform, build-push]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Private Key
      uses: actions/download-artifact@v4
      with:
        name: private-key
        path: ./terraform

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }} # Required for AWS Learner Labs
        aws-region: us-east-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Deploy to EC2
      env:
        HOST: ${{ needs.terraform.outputs.public_ip }}
        USER: ec2-user
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: latest
        AWS_REGION: us-east-1
      run: |
        # Wait for EC2 instance to be ready and Docker to be installed via user_data
        echo "Waiting for EC2 instance and Docker to be ready..."
        sleep 60
        
        # Use the dynamically generated private key
        PRIVATE_KEY_PATH="./terraform/private_key.pem"
        chmod 600 $PRIVATE_KEY_PATH
        
        # Create app directory on EC2 and copy essential files (docker-compose.yml & init.sql)
        ssh -i $PRIVATE_KEY_PATH -o StrictHostKeyChecking=no $USER@$HOST "mkdir -p ~/cs365_lab"
        scp -i $PRIVATE_KEY_PATH -o StrictHostKeyChecking=no docker-compose.yml init.sql $USER@$HOST:~/cs365_lab/
        
        # Run docker-compose on the EC2 instance
        ssh -i $PRIVATE_KEY_PATH -o StrictHostKeyChecking=no $USER@$HOST << EOF
          # Login to ECR on EC2
          aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin \$ECR_REGISTRY
          
          cd ~/cs365_lab
          
          # Pull the latest images
          export FRONTEND_IMAGE=\$ECR_REGISTRY/frontend-repo-v2:\$IMAGE_TAG
          export BACKEND_IMAGE=\$ECR_REGISTRY/backend-repo-v2:\$IMAGE_TAG
          docker-compose pull
          
          # Restart services with new images
          docker-compose up -d
        EOF
